services:
  # ===== MongoDB =====
  mongo:
    image: mongo:7.0
    container_name: cinema-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  # ===== Redis =====
  redis:
    image: redis:7.2-alpine
    container_name: cinema-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===== Backend (Go) =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinema-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: cinema_booking
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-jwt-secret}
      SEAT_LOCK_TTL_SECONDS: ${SEAT_LOCK_TTL_SECONDS:-300}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===== Frontend =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_WS_BASE_URL: ws://localhost:8080
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: cinema-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
